services:
  - type: web
    name: recipe-scale-api
    env: go
    rootDir: backend
    buildCommand: go build -o main ./cmd/api/main.go
    startCommand: ./main
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DB_DSN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 10000
